<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Alchymia · A · Geometric monogram with distillation aperture</title>
  <!-- Brand-guide a-paper / a-slate, scaled ~1.30× so the mark
       reaches the top edge (y=0) and the distillate droplet
       reaches the bottom edge (y≈64). Aspect ratio preserved;
       horizontal margins are the natural ones the A glyph carries.
       ink switches via prefers-color-scheme; SVG-aware browsers
       render the paper or slate variant automatically. -->
  <style>
    .ink { fill: #0F1115; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #EDE9DD; }
    }
  </style>
  <path class="ink" fill-rule="evenodd"
        d="M32 0 L57 52 L51 52 L44 41 L18 41 L13 52 L7 52 Z M25 30 L38 30 L34 37 L29 37 Z"/>
  <ellipse class="ink" cx="32" cy="59.5" rx="3.4" ry="4.2"/>
</svg>
